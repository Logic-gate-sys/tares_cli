services:
  db:
    container_name: taresDB
    image: postgres:17-alpine 
    ports:
      - "5433:5432"
    volumes:
      - "./server/databases/postgres-data:/var/lib/postgresql/data:rw"
    environment:
      - POSTGRES_USER="postgres"
      - POSTGRES_DB="postgres"
      - POSTGRES_PASSWORD="postgres"
    restart: unless-stopped

  test_db:
    container_name: taresDB_test
    image: postgres:17-alpine 
    ports:
      - "5434:5432"
    volumes:
      - "./server/databases/postgres-data-test_db:/var/lib/postgresql/data:rw"
    environment:
      - POSTGRES_USER="postgres"
      - POSTGRES_DB="postgres"
      - POSTGRES_PASSWORD="postgres"
    restart: unless-stopped